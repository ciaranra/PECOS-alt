[project]
name = "pecos-rslib-llvm"
version = "0.8.0.dev8"
description = "LLVM IR generation Python bindings for PECOS (llvmlite-compatible API, Rust implementation)."
authors = [
    {name = "The PECOS Developers"},
]
maintainers = [
    {name = "Ciaran Ryan-Anderson", email = "ciaranra@gmail.com"},
]
dependencies = []
readme = "README.md"
requires-python = ">= 3.10"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
]

[build-system]
requires = ["maturin>=1.13.1,<2.0"]
build-backend = "maturin"

[tool.maturin]
module-name = "pecos_rslib_llvm"

[dependency-groups]
dev = []
test = [
    "pytest>=9.0",
]

[tool.ruff]
lint.extend-select = ["S", "B", "PT"]
lint.ignore = ["S101"]
