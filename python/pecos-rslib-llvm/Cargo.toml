[package]
name = "pecos-rslib-llvm"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "LLVM IR generation Python bindings for PECOS (llvmlite-compatible API)."
publish = false

[lib]
name = "pecos_rslib_llvm"
crate-type = ["cdylib", "rlib"]
doctest = false

[dependencies]
pecos-llvm.workspace = true
inkwell = { workspace = true, features = ["llvm14-0"] }
pyo3 = { workspace = true, features = ["extension-module", "abi3-py310", "generate-import-lib"] }
regex.workspace = true
tempfile.workspace = true
log.workspace = true

[lints]
workspace = true
