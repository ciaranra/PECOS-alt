[package]
name = "pecos-rslib-llvm"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "LLVM IR generation Python bindings for PECOS (llvmlite-compatible API)."
publish = false

[lib]
name = "pecos_rslib_llvm"
crate-type = ["cdylib", "rlib"]
doctest = false

[features]
# See pecos-rslib's Cargo.toml for why this bundle is opt-in.
extension-module = [
    "pyo3/extension-module",
    "pyo3/abi3-py310",
    "pyo3/generate-import-lib",
]

[dependencies]
pecos-llvm.workspace = true
inkwell.workspace = true
pyo3.workspace = true
regex.workspace = true
tempfile.workspace = true
log.workspace = true

[lints]
workspace = true
