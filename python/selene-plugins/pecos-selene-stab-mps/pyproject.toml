[project]
name = "pecos-selene-stab-mps"
version = "0.8.0.dev8"
requires-python = ">=3.10"
description = "PECOS StabMps simulator plugin for the Selene quantum emulator"
license = "Apache-2.0"
dependencies = [
    "selene-core>=0.2",
]

[project.optional-dependencies]
test = [
    "pytest>=9.0",
    "selene-sim>=0.2",
    "guppylang>=0.14",
]

[project.urls]
homepage = "https://pecos.io"
repository = "https://github.com/PECOS-packages/PECOS"

[build-system]
requires = ["hatchling", "packaging"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["python/pecos_selene_stab_mps"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.uv]
cache-keys = [
    { file = "src/**/*.rs" },
    { file = "Cargo.toml" },
]
