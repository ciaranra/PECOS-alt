[package]
name = "pecos-rslib-exp"
version = "0.2.0-dev.0"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Python bindings for experimental PECOS simulators (pecos-stab-tn)."
publish = false

[lib]
name = "pecos_rslib_exp"
crate-type = ["cdylib", "rlib"]
doctest = false

[features]
# See pecos-rslib's Cargo.toml for why this bundle is opt-in.
extension-module = [
    "pyo3/extension-module",
    "pyo3/abi3-py310",
    "pyo3/generate-import-lib",
]

[dependencies]
pecos-core.workspace = true
pecos-eeg.workspace = true
pecos-neo.workspace = true
pecos-qec.workspace = true
pecos-quantum.workspace = true
pecos-random.workspace = true
pecos-simulators.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
rayon.workspace = true
pecos-stab-tn.workspace = true
pyo3 = { workspace = true, features = ["num-complex"] }
num-complex.workspace = true
smallvec.workspace = true

[lints]
workspace = true
