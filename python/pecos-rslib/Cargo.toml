[package]
name = "pecos-rslib"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Allows running Rust code in Python."
publish = false

[lib]
name = "pecos_rslib"
crate-type = ["cdylib", "rlib"]
# Skip doc tests as they won't work properly in this setup
doctest = false

[features]
default = ["wasm"]
wasm = ["pecos/wasm"]
cuda = ["pecos/cuda"]

[dependencies]
# Use the pecos metacrate with all features needed for Python bindings
# Note: default-features=false avoids the "cli" feature which pulls in "which" crate,
# which depends on "winsafe" on Windows - causing unnecessary DLL dependencies
pecos = { workspace = true, default-features = false, features = ["runtime", "hugr", "wasm", "all-simulators", "all-decoders", "build-tools", "qec"] }
pecos-experimental.workspace = true
# For QASM foreign object support (QasmEngineWasm type)
pecos-qasm = { workspace = true, features = ["wasm"] }

pyo3 = { workspace=true, features = ["extension-module", "abi3-py310", "generate-import-lib", "num-complex"] }
rand.workspace = true
pecos-random.workspace = true
ndarray.workspace = true
num-complex.workspace = true
parking_lot.workspace = true
regex.workspace = true
serde_json.workspace = true
tempfile.workspace = true
log.workspace = true
libc.workspace = true
dirs.workspace = true

# Inkwell for LLVM types (needed for llvmlite bindings)
inkwell = { workspace = true, features = ["llvm14-0"] }

[lints]
workspace = true
