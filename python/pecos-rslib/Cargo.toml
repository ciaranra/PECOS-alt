[package]
name = "pecos-rslib"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Allows running Rust code in Python."
publish = false

[lib]
name = "pecos_rslib"
crate-type = ["cdylib", "rlib"]
# Skip doc tests as they won't work properly in this setup
doctest = false

[features]
default = ["wasm"]
wasm = ["dep:pecos-wasm"]
# MWPF decoder — pulls in the highs LP solver which requires cmake at build time.
# Off by default for local dev so cmake is not required. Wheel builds in CI enable
# this so end users get MWPF support out of the box.
mwpf = ["pecos-decoders/mwpf"]
# Bundle of pyo3 features that maturin needs for the Python cdylib but that
# break a plain `cargo test`:
#   - extension-module: tell the linker NOT to link libpython
#   - abi3-py310:        use the limited API; pyo3 then skips emitting
#                        `rustc-link-lib=python` directives
#   - generate-import-lib: Windows-only, generates abi3 import library
# With these enabled, `cargo test` produces a test binary with unresolved
# Python C API symbols (__Py_IncRef, __Py_NoneStruct, ...). Gating them behind
# an opt-in feature lets maturin enable it (via `features =
# ["extension-module"]` in pyproject.toml) while leaving `cargo test` working.
# All four pecos-rslib* crates must agree on this to avoid feature unification
# silently re-enabling it for the whole workspace.
extension-module = [
    "pyo3/extension-module",
    "pyo3/abi3-py310",
    "pyo3/generate-import-lib",
]

[dependencies]
# Core PECOS crates (direct deps instead of metacrate)
pecos-core.workspace = true
pecos-decoder-core.workspace = true
pecos-quantum = { workspace = true, features = ["hugr"] }
pecos-num.workspace = true
pecos-random.workspace = true
pecos-simulators.workspace = true
pecos-engines.workspace = true
pecos-programs.workspace = true

# Program formats
pecos-qasm.workspace = true
pecos-phir = { workspace = true, features = ["hugr"] }
pecos-phir-json.workspace = true

# QIS / HUGR
pecos-qis = { workspace = true, features = ["llvm", "hugr"] }
pecos-hugr-qis.workspace = true
pecos-hugr.workspace = true

# WASM (optional, enabled by default via "wasm" feature)
pecos-wasm = { workspace = true, optional = true }

# C++ simulator backends
pecos-cppsparsestab.workspace = true

# Decoders (all backends except mwpf, which requires cmake — opt in via the
# top-level `mwpf` feature on this crate).
pecos-decoders = { workspace = true, features = [
    "ldpc",
    "fusion-blossom",
    "pymatching",
    "tesseract",
    "chromobius",
    "relay-bp",
    "uf",
] }

# QEC (fault tolerance)
pecos-qec.workspace = true

# Build tools (LLVM/CUDA detection)
pecos-build.workspace = true

# Experimental
pecos-experimental.workspace = true

# Third-party
pyo3 = { workspace = true, features = ["num-complex"] }
rayon.workspace = true
rand.workspace = true
ndarray.workspace = true
nalgebra.workspace = true
num-complex.workspace = true
parking_lot.workspace = true
serde_json.workspace = true
tempfile.workspace = true
log.workspace = true
libc.workspace = true
dirs.workspace = true

[lints]
workspace = true
