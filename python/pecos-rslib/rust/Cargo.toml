# PECOS/python/pecos-rslib/rust/Cargo.toml
[package]
name = "pecos-rslib"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Allows running Rust code in Python."
publish = false

[lib]
name = "pecos_rslib"
crate-type = ["cdylib", "rlib"]
# Skip doc tests as they won't work properly in this setup
doctest = false
# Skip unit tests as well - all testing should be done through Python
test = false

[features]
default = ["pmir-pipeline"]

# PMIR pipeline: HUGR → PAST → PMIR (MLIR) → LLVM IR
pmir-pipeline = ["pecos-qir/pmir-pipeline"]

# HUGR-LLVM pipeline: HUGR → QIR (via hugr-llvm)
hugr-llvm-pipeline = ["pecos-qir/hugr-llvm-pipeline"]

# All compilation pipelines
all-pipelines = ["pmir-pipeline", "hugr-llvm-pipeline"]

# Legacy feature for backward compatibility
hugr = ["hugr-llvm-pipeline"]

[dependencies]
pyo3 = { workspace=true, features = ["extension-module", "abi3-py310", "generate-import-lib"] }
pecos = { workspace = true }
pecos-core = { workspace = true }
pecos-qasm = { workspace = true }
pecos-engines = { workspace = true }
pecos-qir = { workspace = true, features = ["pmir-pipeline", "hugr-llvm-pipeline"] }
parking_lot = { workspace = true}
serde_json = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true

[build-dependencies]
pyo3-build-config = { workspace = true }
