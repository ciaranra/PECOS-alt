# PECOS/python/pecos-rslib/rust/Cargo.toml
[package]
name = "pecos-rslib"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Allows running Rust code in Python."
publish = false

[lib]
name = "pecos_rslib"
crate-type = ["cdylib", "rlib"]
# Skip doc tests as they won't work properly in this setup
doctest = false
# Skip unit tests as well - all testing should be done through Python
test = false

[features]
default = ["pmir-pipeline", "hugr-llvm-pipeline"]

# LLVM JIT execution: QIR file execution via LLVM JIT compilation
# TEMPORARILY DISABLED due to pytest environment conflicts and segfaults
llvm-jit = ["pecos-llvm-runtime/llvm-jit"]

# PMIR pipeline: HUGR → PAST → PMIR (MLIR) → LLVM IR
pmir-pipeline = ["pecos/pmir-pipeline", "pecos-pmir"]

# HUGR-LLVM pipeline: HUGR → LLVM IR (via pecos-hugr-llvm)
hugr-llvm-pipeline = ["pecos-hugr-llvm"]

# All compilation pipelines
all-pipelines = ["pmir-pipeline", "hugr-llvm-pipeline"]

# All features including LLVM JIT (for testing/advanced use)
all-features = ["all-pipelines", "llvm-jit"]

# Legacy feature for backward compatibility
hugr = ["hugr-llvm-pipeline"]

[dependencies]
pyo3 = { workspace=true, features = ["extension-module", "abi3-py310", "generate-import-lib"] }
pecos = { workspace = true }
pecos-core = { workspace = true }
pecos-qasm = { workspace = true }
pecos-engines = { workspace = true }
pecos-llvm-runtime = { workspace = true }
pecos-pmir = { path = "../../../crates/pecos-pmir", optional = true }
pecos-hugr-llvm = { path = "../../../crates/pecos-hugr-llvm", optional = true }
parking_lot = { workspace = true}
serde_json = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true

[build-dependencies]
pyo3-build-config = { workspace = true }
