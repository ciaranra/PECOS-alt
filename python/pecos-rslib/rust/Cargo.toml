# PECOS/python/pecos-rslib/rust/Cargo.toml
[package]
name = "pecos-rslib"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Allows running Rust code in Python."
publish = false

[lib]
name = "pecos_rslib"
crate-type = ["cdylib", "rlib"]
# Skip doc tests as they won't work properly in this setup
doctest = false
# Skip unit tests as well - all testing should be done through Python
test = false

[features]
default = ["wasm", "hugr-llvm-pipeline", "hugr-013"]
wasm = ["pecos-qasm/wasm"]

# LLVM JIT execution: QIR file execution via LLVM JIT compilation
# TEMPORARILY DISABLED due to pytest environment conflicts and segfaults
llvm-jit = ["pecos-llvm-runtime/llvm-jit"]

# HUGR-LLVM pipeline: HUGR → LLVM IR (via pecos-hugr)
hugr-llvm-pipeline = ["pecos-hugr", "dep:hugr"]

# Legacy feature for backward compatibility
hugr = ["hugr-llvm-pipeline"]

# HUGR 0.13 support for guppylang compatibility
hugr-013 = ["pecos-selene/hugr-013"]

[dependencies]
pyo3 = { workspace=true, features = ["extension-module", "abi3-py310", "generate-import-lib"] }
pecos = { workspace = true }
pecos-core = { workspace = true }
pecos-programs = { workspace = true }
pecos-qasm = { workspace = true, features = ["wasm"] }
pecos-engines = { workspace = true }
pecos-llvm-runtime = { workspace = true }
pecos-llvm-sim = { workspace = true }
pecos-selene = { path = "../../../crates/pecos-selene" }
pecos-selene-plugins = { path = "../../../crates/pecos-selene-plugins" }
pecos-phir = { path = "../../../crates/pecos-phir" }
pecos-phir-json = { path = "../../../crates/pecos-phir-json" }
pecos-hugr = { path = "../../../crates/pecos-hugr", optional = true }
hugr = { version = "0.20", optional = true }
parking_lot = { workspace = true}
serde_json = { workspace = true }
tempfile = { workspace = true }
log = { workspace = true }
env_logger = { workspace = true }

[lints]
workspace = true

[build-dependencies]
pyo3-build-config = { workspace = true }
