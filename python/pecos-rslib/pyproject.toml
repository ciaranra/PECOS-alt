[project]
name = "pecos-rslib"
version = "0.8.0.dev1"
description = "Rust libary extensions for Python PECOS."
authors = [
    {name = "The PECOS Developers"},
]
maintainers =[
    {name = "Ciaran Ryan-Anderson", email = "ciaranra@gmail.com"},
]
dependencies = []
readme = "README.md"
requires-python = ">= 3.10"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
]

[build-system]
requires = ["maturin>=1.2,<2.0"]
build-backend = "maturin"

[tool.maturin]
module-name = "pecos_rslib"

[dependency-groups]
dev = [
    "patchelf; platform_system != 'Windows'",  # For setting rpath in shared libraries during development (Linux/macOS only)
]
test = [
    "pytest>=7.0",
]
numpy-compat = [  # NumPy/SciPy compatibility tests
    "numpy>=1.20",
    "scipy>=1.7",
]

# No uv.sources needed - this package has no workspace dependencies

[tool.pytest.ini_options]
markers = [
    "performance: marks tests as performance benchmarks (deselect with '-m \"not performance\"')",
    "numpy: mark tests that verify NumPy compatibility (requires numpy installed)",
]

[tool.ruff]
lint.extend-select = ["S", "B", "PT"]  # Enable bandit, pytest rules
lint.ignore = ["S101", "S301"]  # Ignore assert warnings and pickle warnings in tests
