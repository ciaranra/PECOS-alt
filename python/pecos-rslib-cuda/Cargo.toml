test = false

[dependencies]
pecos-cuquantum = { workspace = true }
pecos-core = { workspace = true }
pecos-simulators = { workspace = true }

pyo3 = { workspace = true, features = ["extension-module", "abi3-py310", "generate-import-lib"] }
log.workspace = true

[build-dependencies]
pecos-build = { workspace = true }
log.workspace = true
env_logger.workspace = true

[lints]
workspace = true
