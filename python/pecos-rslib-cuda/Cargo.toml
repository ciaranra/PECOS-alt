[package]
name = "pecos-rslib-cuda"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "CUDA/cuQuantum Python bindings for PECOS quantum simulators."
publish = false

[lib]
name = "pecos_rslib_cuda"
crate-type = ["cdylib", "rlib"]
doctest = false
test = false

[features]
# See pecos-rslib's Cargo.toml for why this bundle is opt-in.
extension-module = [
    "pyo3/extension-module",
    "pyo3/abi3-py310",
    "pyo3/generate-import-lib",
]

[dependencies]
pecos-cuquantum = { workspace = true }
pecos-core = { workspace = true }
pecos-simulators = { workspace = true }

pyo3.workspace = true
log.workspace = true

[build-dependencies]
pecos-build = { workspace = true }
log.workspace = true
env_logger.workspace = true

[lints]
workspace = true
