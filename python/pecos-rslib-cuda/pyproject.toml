[project]
name = "pecos-rslib-cuda"
version = "0.8.0.dev7"
description = "CUDA/cuQuantum Python bindings for PECOS quantum simulators (Rust implementation)."
authors = [
    {name = "The PECOS Developers"},
]
maintainers = [
    {name = "Ciaran Ryan-Anderson", email = "ciaranra@gmail.com"},
]
dependencies = []
readme = "README.md"
requires-python = ">= 3.10"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Topic :: Scientific/Engineering :: Physics",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
    "Environment :: GPU :: NVIDIA CUDA",
]

[build-system]
requires = ["maturin>=1.2,<2.0"]
build-backend = "maturin"

[tool.maturin]
module-name = "pecos_rslib_cuda"

[dependency-groups]
dev = []
test = [
    "pytest>=7.0",
]

[tool.uv.sources]
pecos-rslib-cuda = { workspace = true }

[tool.pytest.ini_options]
markers = [
    "cuda: marks tests that require CUDA and cuQuantum (deselect with '-m \"not cuda\"')",
]

[tool.ruff]
lint.extend-select = ["S", "B", "PT"]
lint.ignore = ["S101"]
