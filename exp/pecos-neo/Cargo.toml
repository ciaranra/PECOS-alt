[package]
name = "pecos-neo"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Composable quantum simulation with event-driven noise modeling"
readme = "README.md"

[lib]
crate-type = ["rlib"]

[dependencies]
pecos-core.workspace = true
pecos-quantum.workspace = true
pecos-simulators.workspace = true
pecos-random.workspace = true
smallvec.workspace = true
thiserror.workspace = true
rand.workspace = true
rand_core.workspace = true
rayon.workspace = true
num_cpus = "1.16"

pecos-engines.workspace = true
pecos-programs.workspace = true
# Optional: for QASM support
pecos-qasm = { workspace = true, optional = true }
# Optional: for direct HUGR interpreter support
pecos-hugr = { workspace = true, optional = true }

[dev-dependencies]
rand.workspace = true
num-complex.workspace = true
pecos-qasm.workspace = true
pecos-hugr.workspace = true
criterion.workspace = true
proptest = "1.4"
# Enable our own features for doctests and integration tests
pecos-neo = { path = ".", features = ["qasm", "hugr"] }

[[bench]]
name = "hot_path"
harness = false

[features]
default = []
qasm = ["dep:pecos-qasm"]
hugr = ["dep:pecos-hugr"]

[lints]
workspace = true
