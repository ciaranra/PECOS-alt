# Define rules, plugins, and configurations for the ruff linter.
# For more details on rules see: https://docs.astral.sh/ruff/rules

target-version = "py310"
line-length = 120

[lint]
select = [
    "A",        # flake8-builtins
    "ANN",      # flake8-annotations
    "ARG",      # flake8-unused-arguments
    "ASYNC",    # flake8-async
    "B",        # flake8-bugbear
    "BLE",      # flake8-blind-except
    "C4",       # flake8-comprehensions
    "COM",      # flake8-commas
    "D",        # flake8-docstrings
    "DTZ",      # flake8-datetimez
    "E",        # pycodestyle
    "EM",       # flake8-errmsg
    "EXE",      # flake8-executable
    "F",        # Pyflakes
    "FA",       # flake8-future-annotations
    "FBT",      # flake8-boolean-trap
    "FLY",      # flynt
    "G",        # flake8-logging-format
    "I",        # isort (imports)
    "ICN",      # flake8-import-conventions
    "INP",      # flake8-no-pep420 (namespace/no __init__.py)
    "INT",      # flake8-gettext
    "ISC",      # flake9-implicit-str-concat
    "N",        # pep8-naming
    "PERF",     # Perflint
    "PIE",      # flake8-pie
    "PL",       # Pylint
    "PT",       # flake8-pytest-style
    "PTH",      # flake8-use-pathlib
    "PYI",      # flake8-pyi
    "Q",        # flake8-quotes (prefer double quotes over single)
    "RET",      # flake8-return
    "RSE",      # flake8-raise
    "RUF",      # Ruff-specific rules
    "S",        # flake8-bandit
    "SIM",      # flake8-simplify
    "SLF",      # flake8-self
    "SLOT",     # flake8-slots
    "T10",      # flake8-debugger
    "TCH",      # flake8-type-checking
    "TD",       # flake8-todos
    "TID",      # flake8-tidy-imports
    "TRY",      # tryceratops
    "UP",       # pyupgrade (upgrade syntax from old to new)
    "W",        # pycodestyle
    "YTT",      # flake8-2020

    # TODO: uncomment to erase commented code
    # "ERA",      # eradicate
    # TODO: uncomment to alert about TODOs to fix
    # "FIX",      # flak8-fixme
    # TODO: uncomment to highlight print statements
    # "T20",      # flake8-print (any print statement)
]

ignore = [
    # pydocstyle: http://www.pydocstyle.org/en/stable/error_codes.html
    "D100", # Missing docstring in public module
    "D101", # Missing docstring in public class
    "D102", # Missing docstring in public method
    "D103", # Missing docstring in public function
    "D104", # Missing docstring in public package
    "D105", # Missing docstring in magic method
    "D106", # Missing docstring in public nested class
    "D107", # Missing docstring in __init__

    # pylint
    "PLR0912", # Too many branches
    "PLR0913", # Too many arguments
    "PLR0915", # Too many statements
    "PLR2004", # Magic value used in comparison, consider replacing with a constant variable
    "PLW2901", # Loop variable overwritten

    # flake8-todos
    "TD002", # Missing author in TODO
    "TD003", # Missing issue link on the line following this TODO

    # tryceratops
    "TRY002", # Custom exceptions
]

[lint.per-file-ignores]
"**/__init__.py" = ["F401"]  # imported but unused - Expected for __init__.py re-exports
"python/tests/**/*.py" = [
    "INP001",                       # File is part of an implicit namespace package - OK for test directories
    "S101",                         # Use of `assert` detected - Assert is standard practice in test files
    "N802",                         # Function name should be lowercase - Test functions often match gate names
]

"python/quantum-pecos/src/pecos/circuits/*.py" = [
]

"python/quantum-pecos/src/pecos/qeclib/*.py" = [
]

"python/quantum-pecos/src/pecos/misc/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
]
"python/quantum-pecos/src/pecos/engines/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
]
"python/quantum-pecos/src/pecos/tools/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
]
"python/quantum-pecos/src/pecos/error_models/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
]
"python/quantum-pecos/src/pecos/qeccs/*.py" = [
    "ANN001",
    "ANN002",
    "ANN003",
]
"python/quantum-pecos/src/pecos/simulators/*.py" = [
    "ANN",
    "N802",
    "ARG",
    "D205", # 1 blank line required between summary line and description
    "D415", # The first line should end with a period, question mark, or exclamation point
    "D417", # Missing argument descriptions in the docstring
]
"python/quantum-pecos/src/pecos/slr/*.py" = [
    "ANN",
    "D205",
    "D415",
]


[lint.pycodestyle]
max-doc-length = 120

[lint.pydocstyle]
convention = "google"

[lint.isort]
split-on-trailing-comma = true

[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-type-checking]
strict = true
