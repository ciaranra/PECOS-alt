[package]
name = "pecos-julia-ffi"
version = "0.1.0-dev0"
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "C FFI bindings for PECOS Julia package"
publish = false

[lib]
name = "pecos_julia"
crate-type = ["cdylib"]

[dependencies]
# Use pecos with only core feature for minimal dependencies
# The Julia wrapper currently only needs QubitId from pecos-core
pecos = { workspace = true, default-features = false, features = ["core"] }

[lints]
workspace = true
