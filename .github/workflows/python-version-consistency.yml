name: Python Version Consistency Check

permissions:
  contents: read

on:
  push:
    paths:
      - 'pyproject.toml'
      - 'python/**/pyproject.toml'
      - 'scripts/check_python_workspace.py'
      - '.github/workflows/python-version-consistency.yml'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'python/**/pyproject.toml'
      - 'scripts/check_python_workspace.py'
      - '.github/workflows/python-version-consistency.yml'

jobs:
  check_python_workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Check Python workspace metadata
        run: python scripts/check_python_workspace.py
