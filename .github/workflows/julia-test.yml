name: Julia test

env:
  TRIGGER_ON_PR_PUSH: true  # Set to true to enable triggers on PR pushes
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1

on:
  push:
    branches: [ "master", "development", "dev" ]
  pull_request:
    branches: [ "master", "development", "dev" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  julia-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        julia-version: ["1.10", "1.11", "1"]  # 1 = latest stable
        # Exclude some combinations to reduce CI time
        exclude:
          - os: windows-latest
            julia-version: "1.11"
          - os: macOS-latest
            julia-version: "1.11"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Julia ${{ matrix.julia-version }}
      uses: julia-actions/setup-julia@v2
      with:
        version: ${{ matrix.julia-version }}

    - name: Set up Rust
      run: rustup show

    - name: Install LLVM Tools (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        # Add LLVM 14 repository
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-14 main"
        sudo apt-get update
        # Install LLVM 14 specifically
        sudo apt-get install -y llvm-14 clang-14
        # Set environment variable for llvm-sys
        echo "LLVM_SYS_140_PREFIX=/usr/lib/llvm-14" >> $GITHUB_ENV
        # Disable LTO to avoid gold linker plugin issues
        echo "CFLAGS=-fno-lto" >> $GITHUB_ENV
        echo "CXXFLAGS=-fno-lto" >> $GITHUB_ENV
        echo "LDFLAGS=-fno-lto" >> $GITHUB_ENV
        # Verify installation
        which llvm-config-14
        llvm-config-14 --version

    - name: Install LLVM Tools (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install llvm@14
        echo "$(brew --prefix llvm@14)/bin" >> $GITHUB_PATH
        echo "LLVM_SYS_140_PREFIX=$(brew --prefix llvm@14)" >> $GITHUB_ENV
        # Make sure it's available in the current step too
        export PATH="$(brew --prefix llvm@14)/bin:$PATH"
        # Verify installation
        which llc
        llc --version

    - name: Install LLVM Tools (Windows)
      if: matrix.os == 'windows-latest'
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "14.0"
        directory: ${{ runner.temp }}/llvm
        env: true  # Set environment variables including LLVM_SYS_140_PREFIX

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: julia/pecos-julia-ffi

    - name: Set up Visual Studio environment on Windows
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Build Rust FFI library (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Write-Host "Building with LLVM_SYS_140_PREFIX: $env:LLVM_SYS_140_PREFIX"
        cd julia/pecos-julia-ffi
        cargo build --release

    - name: Build Rust FFI library (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        cd julia/pecos-julia-ffi
        cargo build --release

    - name: Run Julia tests
      run: |
        cd julia/PECOS.jl
        julia --project=. -e 'using Pkg; Pkg.instantiate(); include("test/runtests.jl")'

    - name: Run examples
      run: |
        cd julia/PECOS.jl

        # Run demo
        julia --project=. examples/demo.jl

        # Run basic usage
        julia --project=. examples/basic_usage.jl

    - name: Check package loadable
      run: |
        cd julia/PECOS.jl
        julia --project=. -e 'using PECOS; println(pecos_version())'

    - name: Run Julia formatter check
      run: |
        cd julia/PECOS.jl
        julia -e '
          using Pkg
          Pkg.add("JuliaFormatter")
          using JuliaFormatter
          if !format("."; verbose=false, overwrite=false)
            println("Formatting issues found. Please run JuliaFormatter.")
            exit(1)
          end'

    - name: Run Julia linting with Aqua.jl
      run: |
        # Aqua needs the library to be built to load the module
        cd julia/PECOS.jl
        julia --project=. -e '
          using Pkg
          Pkg.add("Aqua")
          using PECOS, Aqua
          Aqua.test_all(PECOS;
            ambiguities=false,
            unbound_args=true,
            undefined_exports=true,
            project_extras=true,
            stale_deps=false,
            deps_compat=true,
            piracies=true,
            persistent_tasks=false
          )'
