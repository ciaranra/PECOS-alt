name: Rust test / linting

env:
  TRIGGER_ON_PR_PUSH: true  # Set to true to enable triggers on PR pushes
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1
  LLVM_VERSION: "14.0.6"

on:
  push:
    branches: [ "main", "master", "development", "dev" ]
    paths:
      - 'crates/**'
      - 'examples/**'
      - 'julia/pecos-julia-ffi/**'
      - 'python/pecos-rslib-cuda/**'
      - 'python/pecos-rslib/**'
      - 'python/pecos-rslib-llvm/**'
      - 'Cargo.toml'
      - 'Justfile'
      - '.github/workflows/rust-test.yml'
      - '.pre-commit-config.yaml'
  pull_request:
    branches: [ "main", "master", "development", "dev" ]
    paths:
      - 'crates/**'
      - 'examples/**'
      - 'julia/pecos-julia-ffi/**'
      - 'python/pecos-rslib-cuda/**'
      - 'python/pecos-rslib/**'
      - 'python/pecos-rslib-llvm/**'
      - 'Cargo.toml'
      - 'Justfile'
      - '.github/workflows/rust-test.yml'
      - '.pre-commit-config.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install Rust (for local testing)
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cargo/bin:$PATH"

      - name: Set up Rust
        run: rustup override set stable && rustup update

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
          save-if: ${{ github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'development' || github.ref_name == 'dev' }}

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'

      - name: Cache LLVM ${{ env.LLVM_VERSION }}
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: ~/.pecos/deps/llvm-14
          key: llvm-${{ env.LLVM_VERSION }}-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Ensure LLVM ${{ env.LLVM_VERSION }}
        run: just ci-env

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  rust-lint-no-llvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (for local testing)
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cargo/bin:$PATH"

      - name: Set up Rust
        run: rustup override set stable && rustup update

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
          save-if: ${{ github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'development' || github.ref_name == 'dev' }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy without LLVM features
        run: |
          for crate in pecos-core pecos-engines pecos-simulators pecos-programs pecos-random pecos-qasm pecos-phir-json pecos-qis-ffi-types; do
            echo "Testing $crate..."
            cd "crates/$crate" && cargo clippy --all-targets -- -D warnings && cd ../..
          done
          echo "Testing pecos without default features..."
          cd crates/pecos && cargo clippy --all-targets --no-default-features -- -D warnings && cd ../..

  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  rust-test:
    needs: [pre-commit, rust-lint]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]

    steps:
      - uses: actions/checkout@v6

      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install Rust (for local testing)
        if: runner.os == 'Windows'
        run: |
          curl -sSf -o rustup-init.exe https://win.rustup.rs
          ./rustup-init.exe -y --default-toolchain stable --default-host x86_64-pc-windows-msvc --profile minimal
          echo "$HOME\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:Path += ";$HOME\.cargo\bin"

      - name: Install Rust (for local testing)
        if: runner.os != 'Windows'
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          export PATH="$HOME/.cargo/bin:$PATH"

      - name: Set up Rust
        run: rustup show

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
          save-if: ${{ github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'development' || github.ref_name == 'dev' }}

      - name: Cache LLVM ${{ env.LLVM_VERSION }}
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: ~/.pecos/deps/llvm-14
          key: llvm-${{ env.LLVM_VERSION }}-${{ runner.os }}-${{ runner.arch }}-v2

      - name: Bootstrap MSVC for the Cargo build path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        # Single mechanism: writes the linker + LIB/INCLUDE into
        # .cargo/config.toml (read by cargo after it spawns). Sets no env pin,
        # so `just ci-env` and the direct `cargo build` steps below both work,
        # identically to a local Windows build.
        run: ./scripts/win-msvc-bootstrap.ps1

      - name: Ensure LLVM ${{ env.LLVM_VERSION }}
        run: just ci-env

      - name: Install CUDA Toolkit (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit-test
        with:
          cuda: '12.6.3'
          method: 'network'
          sub-packages: '["nvcc", "cudart-dev"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'

      - name: Compile tests (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo build -p pecos-cli --release

      - name: Compile tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Use `pecos rust test` for runtime hardware detection (cuQuantum, GPU)
          # Dry-run: just compile, the run step below does the actual test
          cargo build -p pecos-cli --release

      - name: Compile tests (Windows)
        if: runner.os == 'Windows'
        run: cargo build -p pecos-cli --release

      - name: Run tests (macOS)
        if: matrix.os == 'macos-latest'
        env:
          # Prevent Homebrew/system library paths from interfering with linking
          LIBRARY_PATH: /usr/lib
        run: |
          unset LD_LIBRARY_PATH DYLD_LIBRARY_PATH DYLD_FALLBACK_LIBRARY_PATH PKG_CONFIG_PATH
          cargo run -p pecos-cli --release -- rust test

      - name: Run tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run -p pecos-cli --release -- rust test

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: cargo run -p pecos-cli --release -- rust test
