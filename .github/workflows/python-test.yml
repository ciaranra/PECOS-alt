name: Python test / linting

env:
  TRIGGER_ON_PR_PUSH: true  # Set to true to enable triggers on PR pushes
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1
  PYTHONUTF8: 1

on:
  push:
    branches: [ "master", "development", "dev" ]
  pull_request:
    branches: [ "master", "development", "dev" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Visual Studio environment on Windows
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Rust
      run: rustup show

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: python/pecos-rslib

    - name: Install LLVM Tools (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        # Add LLVM 14 repository
        wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
        sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-14 main"
        sudo apt-get update
        # Install LLVM 14 specifically
        sudo apt-get install -y llvm-14 clang-14
        # Set environment variable for llvm-sys
        echo "LLVM_SYS_140_PREFIX=/usr/lib/llvm-14" >> $GITHUB_ENV
        # Disable LTO to avoid gold linker plugin issues
        echo "CFLAGS=-fno-lto" >> $GITHUB_ENV
        echo "CXXFLAGS=-fno-lto" >> $GITHUB_ENV
        echo "LDFLAGS=-fno-lto" >> $GITHUB_ENV
        # Verify installation
        which llvm-config-14
        llvm-config-14 --version

    - name: Install LLVM Tools (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install llvm@14
        echo "$(brew --prefix llvm@14)/bin" >> $GITHUB_PATH
        echo "LLVM_SYS_140_PREFIX=$(brew --prefix llvm@14)" >> $GITHUB_ENV
        # Make sure it's available in the current step too
        export PATH="$(brew --prefix llvm@14)/bin:$PATH"
        # Verify installation
        which llc
        llc --version

    - name: Install LLVM Tools (Windows)
      if: matrix.os == 'windows-latest'
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "14.0"
        directory: ${{ runner.temp }}/llvm
        env: false  # Don't set CC/CXX - we'll use MSVC for C++ compilation

    - name: Setup LLVM Path (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        Write-Host "Setting up LLVM in PATH..."

        # Display LLVM_PATH environment variable set by the action
        Write-Host "LLVM_PATH environment variable: $env:LLVM_PATH"

        # Set LLVM_SYS_140_PREFIX for llvm-sys crate
        "LLVM_SYS_140_PREFIX=$env:LLVM_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        # Ensure we're using MSVC for C++ compilation, not LLVM clang
        Write-Host "Ensuring MSVC is used for C++ compilation..."
        if (Test-Path env:CC) {
          Write-Host "Removing CC environment variable (was: $env:CC)"
          Remove-Item Env:CC -ErrorAction SilentlyContinue
        }
        if (Test-Path env:CXX) {
          Write-Host "Removing CXX environment variable (was: $env:CXX)"
          Remove-Item Env:CXX -ErrorAction SilentlyContinue
        }

        # Clear these from GITHUB_ENV too
        "CC=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "CXX=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

        # Add LLVM bin directory to PATH for this and subsequent steps
        $llvmBinDir = Join-Path -Path $env:LLVM_PATH -ChildPath "bin"

        # Verify the directory exists
        if (Test-Path -Path $llvmBinDir) {
          Write-Host "LLVM bin directory exists at $llvmBinDir"
          # List contents to verify what's available
          Write-Host "LLVM bin directory contents:"
          Get-ChildItem -Path $llvmBinDir | Select-Object -First 10 | ForEach-Object {
            Write-Host "  $($_.Name)"
          }

          # Add to PATH
          "$llvmBinDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$llvmBinDir;$env:PATH"

          # Verify llc is available
          $llcPath = Join-Path -Path $llvmBinDir -ChildPath "llc.exe"
          if (Test-Path -Path $llcPath) {
            Write-Host "Found llc.exe at $llcPath"
            Write-Host "Testing llc.exe:"
            & "$llcPath" --version
          } else {
            Write-Host "WARNING: llc.exe not found at $llcPath"
            # Display all exe files to help diagnose what might be available
            Write-Host "Available executables in bin directory:"
            Get-ChildItem -Path $llvmBinDir -Filter "*.exe" | ForEach-Object {
              Write-Host "  $($_.Name)"
            }
          }
        } else {
          Write-Host "ERROR: LLVM bin directory does not exist at $llvmBinDir"
          Write-Host "LLVM_PATH contents:"
          Get-ChildItem -Path $env:LLVM_PATH | ForEach-Object {
            Write-Host "  $($_.Name)"
          }
          exit 1
        }

    - name: Build and test PECOS (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # Ensure LLVM environment variable is available
        Write-Host "LLVM_SYS_140_PREFIX: $env:LLVM_SYS_140_PREFIX"
        Write-Host "LLVM_PATH: $env:LLVM_PATH"

        # If LLVM_SYS_140_PREFIX is not set but LLVM_PATH is, use LLVM_PATH
        if (-not $env:LLVM_SYS_140_PREFIX -and $env:LLVM_PATH) {
          Write-Host "Setting LLVM_SYS_140_PREFIX from LLVM_PATH"
          $env:LLVM_SYS_140_PREFIX = $env:LLVM_PATH
        }

        # Find MSVC link.exe and create cargo config
        $vsWhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vsWhere -latest -property installationPath
        $linkPath = Get-ChildItem -Path "$vsPath\VC\Tools\MSVC" -Recurse -Filter "link.exe" |
                    Where-Object { $_.FullName -like "*\bin\Hostx64\x64\*" } |
                    Select-Object -First 1 -ExpandProperty FullName

        if ($linkPath) {
          Write-Host "Found MSVC link.exe at: $linkPath"

          # Create .cargo directory and config
          New-Item -ItemType Directory -Force -Path .cargo | Out-Null

          # Create config with escaped path and LLVM environment variable
          $escapedPath = $linkPath.Replace('\', '/')
          "[target.x86_64-pc-windows-msvc]" | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8
          "linker = `"$escapedPath`"" | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8 -Append

          # Add LLVM environment variable to cargo config
          $escapedLLVMPath = $env:LLVM_SYS_140_PREFIX.Replace('\', '/')
          "" | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8 -Append
          "[env]" | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8 -Append
          "LLVM_SYS_140_PREFIX = `"$escapedLLVMPath`"" | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8 -Append

          Write-Host "Created .cargo\config.toml:"
          Get-Content .cargo\config.toml
        } else {
          Write-Error "Could not find MSVC link.exe"
          exit 1
        }

        # Build and test
        make build
        make pytest-all

    - name: Build and test PECOS (non-Windows)
      if: runner.os != 'Windows'
      run: |
        # On macOS, set up minimal environment for matplotlib compatibility
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          # Set matplotlib backend to avoid GUI issues
          export MPLBACKEND=Agg
          export MATPLOTLIB_INTERACTIVE=false

          # Try to fix matplotlib segfault by limiting threading
          export OPENBLAS_NUM_THREADS=1
          export MKL_NUM_THREADS=1
          export NUMEXPR_NUM_THREADS=1
          export OMP_NUM_THREADS=1

          # Disable macOS System Integrity Protection library validation
          # This can help with library loading issues
          export DYLD_LIBRARY_PATH=""

          # Force matplotlib to use bundled libraries instead of system ones
          export MPLCONFIGDIR=$PWD/.matplotlib
          mkdir -p $MPLCONFIGDIR
        fi

        # Build and test
        make build
        make pytest-all

    - name: Run linting
      run: |
        # Run all linting checks
        make lint  # Rust checks + Python pre-commit
