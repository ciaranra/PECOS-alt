name: Python test / linting

env:
  TRIGGER_ON_PR_PUSH: true  # Set to true to enable triggers on PR pushes
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1
  PYTHONUTF8: 1

on:
  push:
    branches: [ "master", "development", "dev" ]
#    # Comment out paths to force run on all pushes
#    paths:
#      - 'python/**'
#      - '.github/workflows/python-test.yml'
#      - '.typos.toml'
#      - 'ruff.toml'
#      - '.pre-commit-config.yaml'
  pull_request:
    branches: [ "master", "development", "dev" ]
#    # Comment out paths to force run on all PRs
#    paths:
#      - 'python/**'
#      - '.github/workflows/python-test.yml'
#      - '.typos.toml'
#      - 'ruff.toml'
#      - '.pre-commit-config.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  python-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Fix SQLite for macOS Python 3.13
      if: ${{ matrix.os == 'macOS-latest' && matrix.python-version == '3.13' }}
      run: |
        # Install pysqlite3-binary which bundles its own SQLite
        uv pip install pysqlite3-binary
        # Create a sitecustomize.py to patch sqlite3 imports
        SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
        cat > "$SITE_PACKAGES/sitecustomize.py" << 'EOF'
import sys
try:
    import pysqlite3
    sys.modules['sqlite3'] = pysqlite3
    sys.modules['sqlite3.dbapi2'] = pysqlite3.dbapi2
except ImportError:
    pass
EOF

    - name: Install the latest version of uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true

    - name: Set up Rust
      run: rustup show

    - name: Cache Rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: python/pecos-rslib

    - name: Install LLVM
      uses: KyleMayes/install-llvm-action@v2
      with:
        version: "14.0"
        env: True

    - name: Configure LLVM
      run: echo "LLVM_SYS_140_PREFIX=$LLVM_PATH" >>"$GITHUB_ENV" && "$LLVM_PATH/bin/llvm-config" --version

    - name: Generate lockfile and install dependencies
      run: |
        uv lock --project .
        uv sync --project .

    - name: Install pecos rng build dependencies
      run: |
        uv pip install build nanobind scikit-build-core cmake ninja

    - name: Build PECOS RNG
      run: |
        cd clib/pecos-rng
        # On macOS, use system compiler instead of LLVM for C++ extensions
        if [[ "${{ matrix.os }}" == "macOS-latest" ]]; then
          unset CC CXX
        fi
        uv pip install .

    - name: Install pecos-rslib with maturin
      run: |
        cd python/pecos-rslib
        # On macOS, use system compiler for C dependencies in Rust crates
        if [[ "${{ matrix.os }}" == "macOS-latest" ]]; then
          unset CC CXX
        fi
        uv run maturin develop --uv

    - name: Install quantum-pecos
      run: |
        cd python/quantum-pecos
        uv pip install -e .

    - name: Run pre-commit checks
      run: uv run pre-commit run --all-files --show-diff-on-failure

    - name: Install test dependencies
      run: |
        cd python/quantum-pecos
        uv pip install -e .[all,test]  # Install with both all and test extras
        uv pip install pytest pytest-cov  # Explicitly install test requirements

    - name: Run standard tests
      run: |
        uv run pytest ./python/tests --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html

    - name: Run optional dependency tests
      run: |
        uv run pytest ./python/tests --doctest-modules --junitxml=junit/test-results.xml --cov=com --cov-report=xml --cov-report=html -m optional_dependency
