name: Python Artifacts

env:
  TRIGGER_ON_PR_PUSH: true  # Set to true to enable triggers on PR pushes

on:
  push:
    branches:
      - dev
      - development
      - master
    tags:
      - 'py-*'
  pull_request:
    branches:
      - dev
      - development
      - master
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA
        type: string
      dry_run:
        description: 'Dry run (build but not publish)'
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  check_pr_push:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' && github.event.action != 'closed' ||
      github.event_name == 'push' && contains(fromJSON('["master", "dev", "development"]'), github.ref_name)
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Check if should run on PR push
        id: check
        run: |
          # Always run on pushes to main branches
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref_name }}" =~ ^(master|dev|development)$ ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          # For PRs, check the TRIGGER_ON_PR_PUSH setting
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ env.TRIGGER_ON_PR_PUSH }}" = "true" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi


  build_wheels_pecos_rslib:
    needs: check_pr_push
    if: needs.check_pr_push.result == 'success' && needs.check_pr_push.outputs.run == 'true'
    runs-on: ${{ matrix.runner || matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            architecture: x86_64
          - os: ubuntu-latest
            architecture: aarch64
            # Use native ARM64 runner for aarch64 builds to avoid cross-compilation issues
            runner: ubuntu-24.04-arm64
          - os: macos-latest
            architecture: x86_64
          - os: macos-latest
            architecture: aarch64
          - os: windows-latest
            architecture: x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Remove conflicting README.md
        run: |
          if [ -f crates/pecos-python/README.md ]; then
            mv crates/pecos-python/README.md crates/pecos-python/README.md.bak
            echo "Moved conflicting README.md to README.md.bak"
          else
            echo "No conflicting README.md found"
          fi

      - name: Install LLVM Tools (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm@14
          echo "$(brew --prefix llvm@14)/bin" >> $GITHUB_PATH
          echo "LLVM_SYS_140_PREFIX=$(brew --prefix llvm@14)" >> $GITHUB_ENV
          # Verify installation
          export PATH="$(brew --prefix llvm@14)/bin:$PATH"
          which llc
          llc --version

      - name: Set LLVM environment for Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Default LLVM path for Linux builds
          echo "LLVM_SYS_140_PREFIX=/usr" >> $GITHUB_ENV

      - name: Install LLVM Tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "14.0"
          directory: ${{ runner.temp }}/llvm
          # Don't use cached: true as it may fail if no cache exists yet
          env: false  # Don't set CC/CXX - we'll use MSVC for C++ compilation

      - name: Setup LLVM Path (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Setting up LLVM..."

          # Since we're using env: false, LLVM_PATH won't be set by the action
          # We need to set it manually to the installation directory
          $llvmPath = "${{ runner.temp }}/llvm"
          Write-Host "Setting LLVM_PATH to: $llvmPath"
          "LLVM_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $env:LLVM_PATH = $llvmPath

          # Set LLVM_SYS_140_PREFIX for llvm-sys crate
          "LLVM_SYS_140_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Add LLVM to PATH
          $llvmBinDir = Join-Path -Path $env:LLVM_PATH -ChildPath "bin"
          "$llvmBinDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Clear CC/CXX to use MSVC
          "CC=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "LLVM configuration completed"
          Write-Host "LLVM_SYS_140_PREFIX will be: $llvmPath"

      - name: Setup cargo config for Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Setting up cargo config for Windows maturin build..."
          $llvmPath = "${{ runner.temp }}\llvm"

          # Verify LLVM installation
          Write-Host "Checking LLVM installation at: $llvmPath"
          if (Test-Path $llvmPath) {
            Write-Host "LLVM directory found"
            Get-ChildItem $llvmPath | Select-Object Name

            # Check for critical LLVM files
            Write-Host "`nChecking for LLVM binaries..."
            $llvmBin = Join-Path -Path $llvmPath -ChildPath "bin"
            if (Test-Path $llvmBin) {
              Write-Host "Contents of bin directory:"
              Get-ChildItem $llvmBin | Select-Object Name | Format-Table

              # Check for llvm-config
              $llvmConfig = Join-Path -Path $llvmBin -ChildPath "llvm-config.exe"
              if (Test-Path $llvmConfig) {
                Write-Host "llvm-config.exe found, testing..."
                & $llvmConfig --version
                & $llvmConfig --prefix
              } else {
                Write-Host "WARNING: llvm-config.exe not found in bin directory"
              }
            }

            Write-Host "`nChecking for LLVM lib directory..."
            $llvmLib = Join-Path -Path $llvmPath -ChildPath "lib"
            if (Test-Path $llvmLib) {
              Write-Host "lib directory exists, checking for .lib files..."
              $libFiles = Get-ChildItem $llvmLib -Filter "*.lib" | Select-Object -First 5
              if ($libFiles) {
                Write-Host "Found .lib files:"
                $libFiles | Select-Object Name
              } else {
                Write-Host "WARNING: No .lib files found"
              }
            }
          } else {
            Write-Error "LLVM directory not found at: $llvmPath"
            exit 1
          }

          # Create cargo config in project directory
          cd python/pecos-rslib
          New-Item -ItemType Directory -Force -Path .cargo | Out-Null

          # Escape backslashes for TOML
          $escapedPath = $llvmPath.Replace('\', '/')

          # Write config
          $configContent = "[env]`nLLVM_SYS_140_PREFIX = `"$escapedPath`""
          $configContent | Out-File -FilePath ".cargo\config.toml" -Encoding UTF8

          # Also create in rust subdirectory
          New-Item -ItemType Directory -Force -Path "rust\.cargo" | Out-Null
          $configContent | Out-File -FilePath "rust\.cargo\config.toml" -Encoding UTF8

          # Also create in user's cargo home directory as a fallback
          $cargoHome = if ($env:CARGO_HOME) { $env:CARGO_HOME } else { "$env:USERPROFILE\.cargo" }
          New-Item -ItemType Directory -Force -Path $cargoHome | Out-Null

          # For user cargo config, append if file exists
          if (Test-Path "$cargoHome\config.toml") {
            "`n$configContent" | Out-File -FilePath "$cargoHome\config.toml" -Encoding UTF8 -Append
          } else {
            $configContent | Out-File -FilePath "$cargoHome\config.toml" -Encoding UTF8
          }

          Write-Host "Created cargo configs with LLVM_SYS_140_PREFIX=$escapedPath"
          Write-Host "Contents of rust/.cargo/config.toml:"
          Get-Content "rust\.cargo\config.toml"

          # Also ensure environment variable is exported
          [System.Environment]::SetEnvironmentVariable("LLVM_SYS_140_PREFIX", $llvmPath, "Process")

          cd ../..

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python3.10
          working-directory: python/pecos-rslib
          # Native builds on all runners - no cross-compilation needed
          target: ${{ matrix.os == 'macos-latest' && (matrix.architecture == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}
          manylinux: '2_28'
          before-script-linux: |
            # Export LLVM environment variable if it's set in GITHUB_ENV
            if [ -n "${LLVM_SYS_140_PREFIX:-}" ]; then
              export LLVM_SYS_140_PREFIX="${LLVM_SYS_140_PREFIX}"
            fi

            # Check if we're in a manylinux container (Linux) or on macOS
            if [[ -f /etc/os-release ]] || [[ -f /etc/centos-release ]]; then
              # We're in a manylinux container - Linux build
              echo "Linux/manylinux environment detected"

              # Install LLVM 14 (manylinux_2_28 is based on AlmaLinux 8)
              # Check if yum is available (manylinux container)
              if command -v yum &> /dev/null; then
                echo "Installing LLVM 14 using yum..."
                yum install -y llvm-devel llvm-static

                # Verify LLVM installation
                if command -v llvm-config &> /dev/null; then
                  echo "LLVM installed successfully"
                  llvm-config --version
                  llvm-config --prefix
                else
                  echo "ERROR: LLVM installation failed"
                  exit 1
                fi
              else
                echo "yum not available - assuming LLVM is already present or will be provided by host"
              fi

              # For Linux builds, set LLVM path if not already set
              if [ -z "${LLVM_SYS_140_PREFIX:-}" ]; then
                export LLVM_SYS_140_PREFIX="/usr"
              fi
              echo "Using LLVM_SYS_140_PREFIX=$LLVM_SYS_140_PREFIX"

              # Create cargo config to ensure the environment variable is available
              mkdir -p ~/.cargo
              mkdir -p python/pecos-rslib/.cargo
              mkdir -p python/pecos-rslib/rust/.cargo

              # Write config to multiple locations
              for config_dir in ~/.cargo python/pecos-rslib/.cargo python/pecos-rslib/rust/.cargo; do
                echo "[env]" > "$config_dir/config.toml"
                echo "LLVM_SYS_140_PREFIX = \"$LLVM_SYS_140_PREFIX\"" >> "$config_dir/config.toml"
              done

              echo "Cargo configs created with LLVM_SYS_140_PREFIX=$LLVM_SYS_140_PREFIX"
            else
              # Not in manylinux container - assume macOS
              # For macOS, LLVM should be set up by the Install LLVM Tools step
              echo "macOS environment detected"

              # Find LLVM installation if not already set
              if [ -z "${LLVM_SYS_140_PREFIX:-}" ]; then
                if [ -d "/usr/local/opt/llvm@14" ]; then
                  export LLVM_SYS_140_PREFIX="/usr/local/opt/llvm@14"
                elif [ -d "/opt/homebrew/opt/llvm@14" ]; then
                  export LLVM_SYS_140_PREFIX="/opt/homebrew/opt/llvm@14"
                else
                  echo "ERROR: Could not find LLVM installation"
                  exit 1
                fi
              fi

              echo "LLVM_SYS_140_PREFIX is set to: $LLVM_SYS_140_PREFIX"

              # Create cargo config in the project directory to persist the environment variable
              cd python/pecos-rslib
              mkdir -p .cargo
              echo "[env]" > .cargo/config.toml
              echo "LLVM_SYS_140_PREFIX = \"$LLVM_SYS_140_PREFIX\"" >> .cargo/config.toml

              # Also create in rust subdirectory
              mkdir -p rust/.cargo
              echo "[env]" > rust/.cargo/config.toml
              echo "LLVM_SYS_140_PREFIX = \"$LLVM_SYS_140_PREFIX\"" >> rust/.cargo/config.toml

              echo "Cargo configs created with LLVM_SYS_140_PREFIX=$LLVM_SYS_140_PREFIX"
              cat rust/.cargo/config.toml
              cd ../..
            fi

      - name: Restore README.md
        if: always()
        run: |
          if [ -f crates/pecos-python/README.md.bak ]; then
            mv crates/pecos-python/README.md.bak crates/pecos-python/README.md
            echo "Restored README.md from backup"
          else
            echo "No README.md backup found"
          fi

      - name: Test wheel is abi3
        run: |
          # Check that the wheel has abi3 tag
          ls -la python/pecos-rslib/dist/
          wheel_file=$(ls python/pecos-rslib/dist/*.whl)
          echo "Built wheel: $wheel_file"
          if [[ $wheel_file == *"abi3"* ]]; then
            echo "Wheel has abi3 tag"
          else
            echo "ERROR: Wheel does not have abi3 tag!"
            exit 1
          fi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-pecos-rslib-${{ matrix.os }}-${{ matrix.architecture }}
          path: python/pecos-rslib/dist/*.whl

  test_abi3_wheels:
    needs: build_wheels_pecos_rslib
    if: |
      always() &&
      needs.build_wheels_pecos_rslib.result == 'success'
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
        platform:
          - runner: ubuntu-latest
            os: ubuntu-latest
            architecture: x86_64
          - runner: windows-latest
            os: windows-latest
            architecture: x86_64
          - runner: macos-13
            os: macos-latest
            architecture: x86_64
          - runner: macos-latest
            os: macos-latest
            architecture: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download abi3 wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-pecos-rslib-${{ matrix.platform.os }}-${{ matrix.platform.architecture }}
          path: ./pecos-rslib-wheel

      - name: Test abi3 wheel with Python ${{ matrix.python-version }}
        run: |
          echo "Testing abi3 wheel with Python ${{ matrix.python-version }}"
          python --version
          pip install --force-reinstall --verbose ./pecos-rslib-wheel/*.whl
          python -c 'import pecos_rslib; print(f"pecos_rslib version: {pecos_rslib.__version__}")'
          python -c 'import sys; print(f"Python version: {sys.version}")'

  build_sdist_quantum_pecos:
    needs: build_wheels_pecos_rslib
    if: |
      always() &&
      needs.build_wheels_pecos_rslib.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download pecos-rslib wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-pecos-rslib-ubuntu-latest-x86_64
          path: ./pecos-rslib-wheel

      - name: Install pecos-rslib
        run: pip install ./pecos-rslib-wheel/*.whl

      - name: Install build dependencies
        run: pip install build

      - name: Build quantum-pecos SDist
        run: |
          cd python/quantum-pecos
          python -m build --sdist --outdir dist

      - name: Test quantum-pecos SDist
        run: |
          pip install python/quantum-pecos/dist/*.tar.gz
          python -c 'import pecos; print(pecos.__version__)'

      - name: Upload quantum-pecos SDist
        uses: actions/upload-artifact@v4
        with:
          name: sdist-quantum-pecos
          path: python/quantum-pecos/dist/*.tar.gz

  build_wheels_quantum_pecos:
    needs: build_wheels_pecos_rslib
    if: |
      always() &&
      needs.build_wheels_pecos_rslib.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download pecos-rslib wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-pecos-rslib-ubuntu-latest-x86_64
          path: ./pecos-rslib-wheel

      - name: Install pecos-rslib
        run: pip install ./pecos-rslib-wheel/*.whl

      - name: Install build dependencies
        run: pip install build

      - name: Build quantum-pecos wheel
        run: |
          cd python/quantum-pecos
          python -m build --wheel --outdir dist

      - name: Test quantum-pecos wheel
        run: |
          pip install python/quantum-pecos/dist/*.whl
          python -c 'import pecos; print(pecos.__version__)'

      - name: Upload quantum-pecos wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-quantum-pecos
          path: python/quantum-pecos/dist/*.whl

  collect_artifacts:
    needs: [build_wheels_pecos_rslib, build_sdist_quantum_pecos, build_wheels_quantum_pecos, test_abi3_wheels]
    if: |
      needs.build_wheels_pecos_rslib.result == 'success' &&
      needs.build_sdist_quantum_pecos.result == 'success' &&
      needs.build_wheels_quantum_pecos.result == 'success' &&
      needs.test_abi3_wheels.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create distribution directories
        run: |
          mkdir -p dist/pecos-rslib
          mkdir -p dist/quantum-pecos

      # Download artifacts into temp directory first
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: temp-artifacts/

      - name: Organize distribution files
        run: |
          # Debug: Show what we downloaded
          echo "=== Downloaded artifacts structure ==="
          ls -la temp-artifacts/

          # Move pecos-rslib wheels to distribution directory
          for artifact in temp-artifacts/wheel-pecos-rslib-*/; do
            if [ -d "$artifact" ]; then
              echo "Processing $artifact"
              mv "$artifact"*.whl dist/pecos-rslib/ 2>/dev/null || true
            fi
          done

          # Move quantum-pecos files to distribution directory
          for artifact in temp-artifacts/*-quantum-pecos*/; do
            if [ -d "$artifact" ]; then
              echo "Processing $artifact"
              mv "$artifact"*.whl dist/quantum-pecos/ 2>/dev/null || true
              mv "$artifact"*.tar.gz dist/quantum-pecos/ 2>/dev/null || true
            fi
          done

          # Clean up
          rm -rf temp-artifacts

      - name: List all collected artifacts
        run: |
          echo "=== pecos-rslib artifacts ==="
          ls -la dist/pecos-rslib/
          echo ""
          echo "=== quantum-pecos artifacts ==="
          ls -la dist/quantum-pecos/
          echo ""
          echo "=== Summary ==="
          echo "pecos-rslib wheels: $(ls -1 dist/pecos-rslib/*.whl 2>/dev/null | wc -l)"
          echo "quantum-pecos distributions: $(ls -1 dist/quantum-pecos/* 2>/dev/null | wc -l)"


      - name: Upload distribution bundle
        uses: actions/upload-artifact@v4
        with:
          name: pecos-distribution
          path: dist/
