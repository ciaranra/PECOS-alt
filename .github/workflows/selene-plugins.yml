name: Selene Plugins

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -C debuginfo=0

on:
  push:
    branches: [master, development, dev]
    paths:
      - 'python/selene-plugins/**'
      - 'crates/pecos-simulators/**'
      - 'crates/pecos-core/**'
      - '.github/workflows/selene-plugins.yml'
  pull_request:
    branches: [master, development, dev]
    paths:
      - 'python/selene-plugins/**'
      - 'crates/pecos-simulators/**'
      - 'crates/pecos-core/**'
      - '.github/workflows/selene-plugins.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # Build and test on the current platform (fast feedback)
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build Selene plugins (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release \
            -p pecos-selene-stabilizer \
            -p pecos-selene-statevec

      - name: Build Selene plugins (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release -p pecos-selene-stabilizer -p pecos-selene-statevec

      - name: Copy libraries to Python packages (Unix)
        if: runner.os != 'Windows'
        run: |
          # Determine library extension
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            EXT="dylib"
          else
            EXT="so"
          fi

          # Copy libraries
          mkdir -p python/selene-plugins/pecos-selene-stabilizer/python/pecos_selene_stabilizer/_dist/lib
          mkdir -p python/selene-plugins/pecos-selene-statevec/python/pecos_selene_statevec/_dist/lib

          cp target/release/libpecos_selene_stabilizer.$EXT python/selene-plugins/pecos-selene-stabilizer/python/pecos_selene_stabilizer/_dist/lib/
          cp target/release/libpecos_selene_statevec.$EXT python/selene-plugins/pecos-selene-statevec/python/pecos_selene_statevec/_dist/lib/

      - name: Copy libraries to Python packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path python/selene-plugins/pecos-selene-stabilizer/python/pecos_selene_stabilizer/_dist/lib
          New-Item -ItemType Directory -Force -Path python/selene-plugins/pecos-selene-statevec/python/pecos_selene_statevec/_dist/lib

          Copy-Item target/release/pecos_selene_stabilizer.dll python/selene-plugins/pecos-selene-stabilizer/python/pecos_selene_stabilizer/_dist/lib/
          Copy-Item target/release/pecos_selene_statevec.dll python/selene-plugins/pecos-selene-statevec/python/pecos_selene_statevec/_dist/lib/

      - name: Install Python packages
        run: |
          uv pip install --system -e ./python/selene-plugins/pecos-selene-stabilizer[test]
          uv pip install --system -e ./python/selene-plugins/pecos-selene-statevec[test]

      - name: Run tests
        run: |
          pytest python/selene-plugins/ -v --tb=short

  # Build wheels for distribution
  build-wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
        plugin:
          - name: pecos-selene-stabilizer
            package: pecos_selene_stabilizer
          - name: pecos-selene-statevec
            package: pecos_selene_statevec

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Rust
        run: rustup show

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build Rust library (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release -p ${{ matrix.plugin.name }}

      - name: Build Rust library (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release -p ${{ matrix.plugin.name }}

      - name: Copy library to Python package (Unix)
        if: runner.os != 'Windows'
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            EXT="dylib"
          else
            EXT="so"
          fi
          PLUGIN_DIR="python/selene-plugins/${{ matrix.plugin.name }}"
          mkdir -p "$PLUGIN_DIR/python/${{ matrix.plugin.package }}/_dist/lib"
          cp "target/release/lib${{ matrix.plugin.package }}.$EXT" "$PLUGIN_DIR/python/${{ matrix.plugin.package }}/_dist/lib/"

      - name: Copy library to Python package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pluginDir = "python/selene-plugins/${{ matrix.plugin.name }}"
          New-Item -ItemType Directory -Force -Path "$pluginDir/python/${{ matrix.plugin.package }}/_dist/lib"
          Copy-Item "target/release/${{ matrix.plugin.package }}.dll" "$pluginDir/python/${{ matrix.plugin.package }}/_dist/lib/"

      - name: Build wheel
        run: |
          cd python/selene-plugins/${{ matrix.plugin.name }}
          uv pip install --system build
          python -m build --wheel --outdir dist

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.plugin.name }}-${{ matrix.os }}
          path: python/selene-plugins/${{ matrix.plugin.name }}/dist/*.whl

  # Collect all wheels into a single artifact
  collect-wheels:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v7
        with:
          path: wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: List wheels
        run: |
          echo "=== All Selene plugin wheels ==="
          ls -la wheels/
          echo ""
          echo "=== Summary ==="
          echo "Total wheels: $(ls -1 wheels/*.whl 2>/dev/null | wc -l)"

      - name: Upload combined wheels
        uses: actions/upload-artifact@v7
        with:
          name: selene-plugin-wheels
          path: wheels/*.whl
