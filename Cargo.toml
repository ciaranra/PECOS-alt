[workspace]
resolver = "2"
members = [
    "python/pecos-rslib",
    "julia/pecos-julia-ffi",
    "crates/pecos*",
    "crates/benchmarks",
]

# By default, exclude decoder crates from workspace operations to avoid heavy C++ dependencies
default-members = [
    "crates/pecos-core",
    "crates/pecos-num",
    "crates/pecos-engines",
    "crates/pecos-qsim",
    "crates/pecos-qasm",
    "crates/pecos-phir",
    "crates/pecos-qec",
    "crates/pecos-rng",
    "crates/pecos",
    "crates/pecos-cli",
    "crates/pecos-quest",
    "python/pecos-rslib",
    "crates/benchmarks",
]

# The decoder crates are external and have heavy C++ dependencies.
# To work with decoders:
#
# Build specific decoders:
#   cargo build --package pecos-decoders --features "ldpc"
#
# Build all decoders:
#   cargo build --package pecos-decoders --all-features
#
# Build everything including decoders:
#   cargo build --workspace

[workspace.package]
version = "0.1.1"
edition = "2024"
readme = "README.md"
authors = [
    "The PECOS Developers",
    "Ciaran Ryan-Anderson<ciaranra@gmail.com>",
]
homepage = "https://pecos.io"
repository = "https://github.com/PECOS-packages/PECOS"
license = "Apache-2.0"
keywords = ["scientific", "quantum", "QEC"]
categories = ["science", "simulation"]

[workspace.dependencies]
pyo3 = { version = "0.27", features = ["extension-module"] }
pyo3-build-config = { version = "0.27", features = ["resolve-config"] }
rayon = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
criterion = "0.7"
libloading = "0.8"
libc = "0.2"
bytemuck = {  version = "1", features = ["derive"] }
bitflags = "2"
dyn-clone = "1"
regex = "1"
pest = "2"
pest_derive = "2"
tempfile = "3"
assert_cmd = "2"
wasmtime = { version = "38", default-features = false, features = ["cranelift", "runtime", "wat", "std"] }
wat = "1"
cc = "1"
ron = "0.11"
tket = "0.16"
tket-qsystem = { version = "0.22", default-features = false }
cxx = "1.0.187"
cxx-build = "1.0.187"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
tar = "0.4"
flate2 = "1"
bzip2 = "0.6"
sha2 = "0.10"
dirs = "6"
approx = "0.5"
itertools = "0.14"
inkwell = "0.6"
bincode = "2"
tracing = "0.1"
cargo_metadata = "0.23"
xz2 = "0.1"
sevenz-rust = "0.6"

# Logging
log = "0.4"
env_logger = "0.11"

# Error handling
anyhow = "1"
thiserror = "2"

# Numerical computing
peroxide = "0.40"
roots = "0.0.8"
levenberg-marquardt = "0.15"
nalgebra = "0.34"
rustworkx-core = "0.17"
num-complex = "0.4"
num-traits = "0.2"
num-bigint = { version = "0.4", features = ["serde"] }
bitvec = { version = "1", features = ["serde"] }
ndarray = "0.16"
rand = "0.9"
rand_chacha = "0.9"

# Windows workaround: Disable zstd-sys legacy feature to avoid MSVC ICE
# MSVC 14.43 has an internal compiler error (C1001) when compiling zstd_v06.c
# The legacy feature compiles old zstd formats (v0.1-v0.7) that PECOS doesn't need
zstd-sys = { version = "2.0", default-features = false, features = ["zdict_builder"] }

pecos-core = { version = "0.1.1", path = "crates/pecos-core" }
pecos-programs = { version = "0.1.1", path = "crates/pecos-programs" }
pecos-qsim = { version = "0.1.1", path = "crates/pecos-qsim" }
pecos-qasm = { version = "0.1.1", path = "crates/pecos-qasm" }
pecos-phir-json = { version = "0.1.1", path = "crates/pecos-phir-json" }
pecos-engines = { version = "0.1.1", path = "crates/pecos-engines" }
pecos-phir = { version = "0.1.1", path = "crates/pecos-phir" }
pecos-qec = { version = "0.1.1", path = "crates/pecos-qec" }
pecos-rng = { version = "0.1.1", path = "crates/pecos-rng" }
pecos = { version = "0.1.1", path = "crates/pecos" }
pecos-cli = { version = "0.1.1", path = "crates/pecos-cli" }
pecos-qis-ffi = { version = "0.1.1", path = "crates/pecos-qis-ffi" }
pecos-qis-ffi-types = { version = "0.1.1", path = "crates/pecos-qis-ffi-types" }
pecos-qis-selene = { version = "0.1.1", path = "crates/pecos-qis-selene" }
pecos-qis-core = { version = "0.1.1", path = "crates/pecos-qis-core" }
pecos-hugr-qis = { version = "0.1.1", path = "crates/pecos-hugr-qis" }
pecos-llvm = { version = "0.1.1", path = "crates/pecos-llvm" }
pecos-rslib = { version = "0.1.1", path = "python/pecos-rslib" }
pecos-wasm = { version = "0.1.1", path = "crates/pecos-wasm" }
pecos-build-utils = { version = "0.1.1", path = "crates/pecos-build-utils" }
pecos-llvm-utils = { version = "0.1.1", path = "crates/pecos-llvm-utils" }
pecos-num = { version = "0.1.1", path = "crates/pecos-num" }

# Decoder crates
pecos-decoder-core = { version = "0.1.1", path = "crates/pecos-decoder-core" }
pecos-decoders = { version = "0.1.1", path = "crates/pecos-decoders" }

# ldpc decoder wrapper (https://github.com/quantumgizmos/ldpc)
pecos-ldpc-decoders = { version = "0.1.1", path = "crates/pecos-ldpc-decoders" }

# QuEST simulator wrapper (https://github.com/quest-kit/QuEST)
pecos-quest = { version = "0.1.1", path = "crates/pecos-quest" }

# Qulacs simulator wrapper (https://github.com/qulacs/qulacs)
pecos-qulacs = { version = "0.1.1", path = "crates/pecos-qulacs" }

# CppSparseSim simulator wrapper
pecos-cppsparsesim = { version = "0.1.1", path = "crates/pecos-cppsparsesim" }

# Optimize build times
[profile.dev]
opt-level = 0          # No optimization for faster compilation
debug = true           # Include debug info
incremental = true     # Enable incremental compilation
split-debuginfo = "unpacked"  # Faster linking on supported platforms

# For tests, use no optimization for fastest compilation
[profile.test]
opt-level = 0          # No optimization for fastest compilation
debug = true           # Include debug info
incremental = true     # Enable incremental compilation
split-debuginfo = "unpacked"  # Faster linking on supported platforms

# The release profile
[profile.release]
opt-level = 3          # Maximum optimization
lto = true             # Link-time optimization (same as "fat")
codegen-units = 1      # Single codegen unit for better optimization

[workspace.lints.clippy]
# For more details see: https://doc.rust-lang.org/clippy/lints.html
suspicious = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# restriction = "warn"
cargo = { level = "warn", priority = -1 }
multiple-crate-versions = "allow" # TODO: remove when possible
# Allow more function arguments for PyO3 bindings (many parameters needed for Python interop)
too-many-arguments = "allow"
