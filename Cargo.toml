[workspace]
resolver = "2"
members = [
    "python/pecos-rslib/rust",
    "crates/pecos*",
    "crates/benchmarks",

    "crates/prototype",
    "crates/proto_bytemessage",
    "python/proto_bytemessage_py",
    "crates/processors",
    "crates/plugin-system",
    "crates/plugin-python-service",

    "examples/plugin-demo",
    "examples/rust-plugins/custom-processors", "examples/external-cengine",
]

[workspace.package]
version = "0.1.1"
edition = "2024"
readme = "README.md"
authors = [
    "The PECOS Developers",
    "Ciaran Ryan-Anderson<ciaranra@gmail.com>",
]
homepage = "https://pecos.io"
repository = "https://github.com/PECOS-packages/PECOS"
license = "Apache-2.0"
keywords = ["scientific", "quantum", "QEC"]
categories = ["science", "simulation"]

[workspace.dependencies]
rand = "0.9"
rand_chacha = "0.9"
rand_xoshiro = "0.7"
pyo3 = { version = "0.23", features = ["extension-module"] }
rayon = "1"
clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
os_pipe = "1"
lazy_static = "1"
parking_lot = "0.12"
num-complex = "0.4"
num-traits = "0.2"
criterion = "0.5"
libloading = "0.8"
toml = "0.8"
memoffset = "0.9"
bytemuck = {  version = "1", features = ["derive"] }
bitflags = "2"
syn = { version = "2", features = ["full"] }
quote = "1"

pecos-derive = { version = "0.1.1", path = "crates/pecos-derive"}
pecos-core = { version = "0.1.1", path = "crates/pecos-core" }
pecos-qsim = { version = "0.1.1", path = "crates/pecos-qsim" }
pecos-engines = { version = "0.1.1", path = "crates/pecos-engines" }
pecos-qec = { version = "0.1.1", path = "crates/pecos-qec" }
pecos = { version = "0.1.1", path = "crates/pecos" }
pecos-cli = { version = "0.1.1", path = "crates/pecos-cli" }
pecos-rslib = { version = "0.1.1", path = "python/pecos-rslib/rust"}

prototype = { version = "0.1.1", path = "crates/prototype"}
proto_bytemessage = { version = "0.1.1", path = "crates/proto_bytemessage"}
protot_bytemessage_py = { version = "0.1.1", path = "python/proto_bytemessage_py" }

processors = { path = "crates/processors" }
plugin-system = { path = "crates/plugin-system" }
plugin-python-service = { path = "crates/plugin-python-service" }

[profile.release]
codegen-units = 1
lto = "fat"

[workspace.lints.clippy]
# For more details see: https://doc.rust-lang.org/clippy/lints.html
suspicious = { level = "warn", priority = -1 }
complexity = { level = "warn", priority = -1 }
perf = { level = "warn", priority = -1 }
style = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# restriction = "warn"
# cargo = { level = "warn", priority = -1 }
multiple-crate-versions = "allow" # TODO: remove when possible
missing-errors-doc = "allow" # TODO: remove when finished development...

[workspace.metadata.commands]
test-py = ["./scripts/setup-env.sh", "cargo", "test", "-p", "pecos-python"]
