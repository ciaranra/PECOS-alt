[package]
name = "pecos-phir"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "PECOS High-level Intermediate Representation (PHIR) pipeline for quantum program compilation and execution."

[dependencies]
# Core PECOS dependencies
pecos-core = { workspace = true, features = ["anyhow"] }
pecos-engines.workspace = true

# Logging
log.workspace = true

# JSON serialization (keeping for HUGR parsing)
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }

# Error handling
thiserror.workspace = true

# Regular expressions for text processing
regex.workspace = true

# Temporary file handling for MLIR pipeline
tempfile.workspace = true

# RON (Rusty Object Notation) for debugging
ron.workspace = true

# HUGR support via tket (formerly tket2, which re-exports hugr)
tket = { workspace = true, optional = true }
tket-qsystem = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true

[features]
default = []

# HUGR parsing support
hugr = ["tket", "tket-qsystem"]

[lints]
workspace = true
