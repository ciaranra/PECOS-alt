[package]
name = "pecos-phir"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "PECOS High-level Intermediate Representation (PHIR) pipeline for quantum program compilation and execution."

[dependencies]
# Core PECOS dependencies
pecos-core = { workspace = true, features = ["anyhow"] }
pecos-engines.workspace = true

# HUGR dependencies
hugr-core = "0.20.1"
anyhow = "1.0"

# Pest parser dependencies for HUGR parsing
pest = "2.7"
pest_derive = "2.7"

# JSON serialization (keeping for HUGR parsing)
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Regular expressions for text processing
regex.workspace = true

# Logging
log.workspace = true

# Lazy static for global dialect registry
lazy_static = "1.4"

# Temporary file handling for MLIR pipeline
tempfile.workspace = true

# RON (Rusty Object Notation) for debugging
ron = "0.8"

# Python bindings (optional)
pyo3 = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true
env_logger.workspace = true

[features]
default = []

# Python bindings
python-bindings = ["pyo3"]

[lints]
workspace = true