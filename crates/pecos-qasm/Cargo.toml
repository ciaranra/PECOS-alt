[package]
name = "pecos-qasm"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "OpenQASM 2.0 parser and execution engine for PECOS"

[features]
default = ["wasm"]
wasm = ["pecos-wasm/wasm", "wat"]
phir = ["pecos-phir"]

[dependencies]
# Parser generator
pest.workspace = true
pest_derive.workspace = true

# Text processing
regex.workspace = true

# Logging
log.workspace = true

# Workspace dependencies
pecos-core.workspace = true
pecos-quantum.workspace = true
pecos-programs.workspace = true
pecos-engines.workspace = true
pecos-random.workspace = true

# Serialization (for result formatting)
serde_json.workspace = true

# BitVec for storing register results
bitvec.workspace = true

# Optional PHIR conversion support
pecos-phir = { workspace = true, optional = true }

# Optional WebAssembly support
pecos-wasm = { workspace = true, optional = true }
wat = { workspace = true, optional = true }

[dev-dependencies]
# Testing
tempfile.workspace = true
# Required for doctests
pest.workspace = true
pecos-core.workspace = true
pecos-engines.workspace = true

[lints]
workspace = true
