[package]
name = "pecos-selene-plugins"
version.workspace = true
edition.workspace = true
description = "Runtime plugins for PECOS-Selene integration"
authors.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Selene core for RuntimeInterface trait
selene-core = { git = "https://github.com/CQCL/selene.git", rev = "f9e14c4c218feea85ba7c23048eb5118d6a4ed8c" }

# For error handling
anyhow.workspace = true

# For logging
log.workspace = true

# For plugin building
tempfile.workspace = true

# For PECOS integration (optional)
pecos-engines = { path = "../pecos-engines", optional = true }

[features]
default = []
pecos-integration = ["pecos-engines"]

[lints]
workspace = true
