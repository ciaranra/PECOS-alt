[package]
name = "pecos-qis-core"
version.workspace = true
edition.workspace = true
description = "Core quantum instruction set (QIS) infrastructure for PECOS"
readme.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true


[dependencies]
pecos-qis-ffi-types.workspace = true
pecos-core.workspace = true
pecos-engines.workspace = true
pecos-programs.workspace = true
log.workspace = true
dyn-clone.workspace = true
tempfile.workspace = true
# LLVM JIT execution
rand.workspace = true
rand_chacha.workspace = true

# Platform-specific inkwell configuration
# Use dynamic linking on all platforms for compatibility with prebuilt LLVM binaries
[target.'cfg(windows)'.dependencies]
inkwell = { workspace = true, features = ["llvm14-0"], optional = true }

[target.'cfg(not(windows))'.dependencies]
inkwell = { workspace = true, features = ["llvm14-0-force-dynamic"], optional = true }

[features]
default = ["llvm"]
llvm = ["dep:inkwell"]

[dev-dependencies]
pecos-qis-selene.workspace = true

[lints]
workspace = true
