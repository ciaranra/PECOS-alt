[package]
name = "pecos-num"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "README.md"
description = "Numerical computing support for PECOS"

[dependencies]
# Linear algebra (for polynomial fitting, curve fitting, matrix operations)
nalgebra.workspace = true

# Array interface (for API compatibility and return types)
ndarray.workspace = true

# Random number generation (for numpy.random drop-in replacements)
rand.workspace = true
pecos-random.workspace = true

# Complex number support (for numpy complex operations)
num-complex.workspace = true

# Numeric traits (for generic trait implementations)
num-traits.workspace = true

# Logging
log.workspace = true

# Graph algorithms (for MWPM decoder and other graph operations)
rustworkx-core.workspace = true

# Serialization (for JSON attribute support in graphs)
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true

[lints]
workspace = true
