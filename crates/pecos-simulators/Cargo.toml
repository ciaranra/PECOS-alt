[package]
name = "pecos-simulators"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "Quantum simulator traits and implementations for PECOS"
readme = "README.md"

[features]
default = []
# Enable multi-threaded gate execution for large state vectors (20+ qubits).
# Provides 1.5x-7x speedups for single-shot workloads like amplitude calculation.
# Do NOT enable for multi-shot workloads where shots are parallelized at the
# orchestration level - this causes thread oversubscription and hurts throughput.
parallel = ["rayon"]

[dependencies]
pecos-core.workspace = true
pecos-quantum.workspace = true
pecos-random.workspace = true
rand.workspace = true
num-complex.workspace = true
nalgebra.workspace = true
smallvec.workspace = true
wide.workspace = true
rayon = { version = "1.10", optional = true }

[dev-dependencies]
rand.workspace = true
paste.workspace = true

[lints]
workspace = true
