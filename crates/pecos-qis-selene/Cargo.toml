[package]
name = "pecos-qis-selene"
version.workspace = true
edition.workspace = true
description = "Selene runtime integration for quantum instruction set programs"
readme.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
# Just an rlib - the cdylib with __quantum__rt__* symbols is in pecos-qis-ffi
crate-type = ["rlib"]

[features]
default = ["hugr"]
hugr = ["pecos-hugr-qis"]

[dependencies]
pecos-core.workspace = true
pecos-programs.workspace = true
pecos-qis-ffi-types.workspace = true
pecos-qis-ffi.workspace = true  # Ensures cdylib gets built for runtime dlopen
pecos-qis-core.workspace = true
pecos-hugr-qis = { workspace = true, optional = true }
log.workspace = true
libloading.workspace = true
tempfile.workspace = true
bincode.workspace = true

[dev-dependencies]
pecos-engines.workspace = true

[build-dependencies]

[lints]
workspace = true
