[package]
name = "pecos-qis-selene"
version.workspace = true
edition.workspace = true
description = "Selene runtime integration for quantum instruction set programs"
readme.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[lib]
# Just an rlib - the cdylib with __quantum__rt__* symbols is in pecos-qis-ffi
crate-type = ["rlib"]

[features]
default = ["hugr", "selene-runtimes"]
hugr = ["pecos-hugr-qis"]
selene-runtimes = ["selene-simple-runtime", "selene-soft-rz-runtime"]

[dependencies]
pecos-core.workspace = true
pecos-programs.workspace = true
pecos-qis-ffi-types.workspace = true
pecos-qis-ffi.workspace = true  # Ensures cdylib gets built for runtime dlopen
pecos-qis-core = { workspace = true, features = ["llvm"] }
pecos-hugr-qis = { workspace = true, optional = true, features = ["llvm"] }
log.workspace = true
libloading.workspace = true
tempfile.workspace = true
bincode.workspace = true
# Selene runtime crates - these build the .so files we need
selene-simple-runtime = { git = "https://github.com/CQCL/selene.git", rev = "1794e8d1dba26120a18e904940c014f4e034bed6", optional = true }
selene-soft-rz-runtime = { git = "https://github.com/CQCL/selene.git", rev = "1794e8d1dba26120a18e904940c014f4e034bed6", optional = true }

[dev-dependencies]
pecos-engines.workspace = true

[build-dependencies]
cargo_metadata = "0.18"
log.workspace = true
env_logger.workspace = true

[lints]
workspace = true
