[package]
name = "pecos-pmir"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "PECOS MLIR (PMIR) pipeline for quantum program compilation and execution."

[dependencies]
# Core PECOS dependencies
pecos-core = { workspace = true, features = ["anyhow"] }
pecos-engines.workspace = true

# HUGR dependencies
hugr-core = "0.20.1"
anyhow = "1.0"

# Pest parser dependencies for HUGR parsing
pest = "2.7"
pest_derive = "2.7"

# RON and JSON serialization
ron = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Regular expressions for text processing
regex.workspace = true

# Logging
log.workspace = true

# Temporary file handling for MLIR pipeline
tempfile.workspace = true

# Python bindings (optional)
pyo3 = { workspace = true, optional = true }

[dev-dependencies]
tempfile.workspace = true
env_logger.workspace = true

[features]
default = []

# Direct PMIR execution using PECOS simulators
direct-execution = []

# MLIR toolchain compilation to LLVM-IR
mlir-compilation = []

# Python bindings
python-bindings = ["pyo3"]

# All features
all-features = ["direct-execution", "mlir-compilation", "python-bindings"]

[lints]
workspace = true