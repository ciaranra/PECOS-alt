[package]
name = "pecos-qis-runtime"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "QIS (Quantum Instruction Set) runtime execution capabilities for quantum programs in PECOS."

[dependencies]
log.workspace = true
pecos-core = { workspace = true, features = ["anyhow"] }
pecos-engines.workspace = true
regex.workspace = true
libloading.workspace = true
libc.workspace = true
bytemuck.workspace = true
tempfile.workspace = true

[dev-dependencies]
tempfile.workspace = true
serial_test.workspace = true
rand.workspace = true
rand_chacha.workspace = true

[features]
default = []

# LLVM JIT execution: LLVM IR file execution via LLVM JIT compilation
# TEMPORARILY DISABLED due to pytest environment conflicts and segfaults
# TODO: Re-implement with proper isolation or alternative execution strategy
llvm-jit = []

# Selene runtime integration: Forward QIS calls to Selene runtime plugins
selene-integration = []

# All features including LLVM JIT (for advanced users)
# Note: selene-integration excluded from all-features to avoid symbol conflicts
all-features = ["llvm-jit"]

[lints]
workspace = true
