[package]
name = "pecos-qir"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "QIR (Quantum Intermediate Representation) execution capabilities for PECOS."

[dependencies]
log.workspace = true
pecos-core = { workspace = true, features = ["anyhow", "hugr-support"] }
pecos-engines.workspace = true
regex.workspace = true
libloading.workspace = true
bytemuck.workspace = true
tempfile.workspace = true
# HUGR dependencies (optional)
hugr-core = { version = "0.20.1", optional = true }
hugr-llvm = { version = "0.20.1", optional = true }
serde = { version = "1.0", optional = true }
serde_json = { version = "1.0", optional = true }
anyhow = { version = "1.0", optional = true }

[build-dependencies]
# No specific build dependencies required

[dev-dependencies]
tempfile.workspace = true
serial_test.workspace = true

[features]
default = ["hugr-support"]
hugr-support = ["hugr-core", "hugr-llvm", "serde", "serde_json", "anyhow"]

[lints]
workspace = true
