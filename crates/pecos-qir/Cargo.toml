[package]
name = "pecos-qir"
version.workspace = true
edition.workspace = true
readme = "README.md"
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
description = "QIR (Quantum Intermediate Representation) execution capabilities for PECOS."

[dependencies]
log.workspace = true
pecos-core = { workspace = true, features = ["anyhow", "hugr-llvm"] }
pecos-engines.workspace = true
regex.workspace = true
libloading.workspace = true
libc.workspace = true
bytemuck.workspace = true
tempfile.workspace = true
env_logger.workspace = true
parking_lot.workspace = true
# Pest parser dependencies
pest = "2.7"
pest_derive = "2.7"
# RON serialization
ron = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
# HUGR dependencies (optional)
hugr-core = { version = "0.20.1", optional = true }
hugr-llvm = { version = "0.20.1", optional = true }
anyhow = { version = "1.0", optional = true }

[build-dependencies]
# No specific build dependencies required

[dev-dependencies]
tempfile.workspace = true
serial_test.workspace = true
env_logger.workspace = true

[[bin]]
name = "test_segfault"
path = "src/bin/test_segfault.rs"

[[bin]]
name = "test_segfault_stress"
path = "src/bin/test_segfault_stress.rs"

[features]
default = ["pmir-pipeline"]

# LLVM JIT execution: QIR file execution via LLVM JIT compilation
# TEMPORARILY DISABLED due to pytest environment conflicts and segfaults
# TODO: Re-implement with proper isolation or alternative execution strategy
llvm-jit = []

# PMIR pipeline: HUGR → PAST → PMIR (MLIR) → LLVM IR
# Uses MLIR toolchain for compilation
pmir-pipeline = ["hugr-core", "anyhow"]

# HUGR-LLVM pipeline: HUGR → QIR (via hugr-llvm)
# Uses hugr-llvm for direct HUGR to QIR compilation
hugr-llvm-pipeline = ["hugr-core", "hugr-llvm", "anyhow"]

# All compilation pipelines available
all-pipelines = ["pmir-pipeline", "hugr-llvm-pipeline"]

# All features including LLVM JIT (for advanced users)
all-features = ["all-pipelines", "llvm-jit"]

[lints]
workspace = true
