[package]
name = "pecos"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"
description = "A crate for evaluating and exploring quantum error correction."
# Disable auto-discovery of binaries (we only want pecos binary, not engine_setup helper module)
autobins = false

[lib]
doctest = true
test = true

[[bin]]
name = "pecos"
path = "src/bin/pecos.rs"
required-features = ["cli"]

[dependencies]
# Core simulation library dependencies (optional - for runtime commands)
pecos-core = { workspace = true, optional = true }
pecos-quantum = { workspace = true, optional = true }
pecos-qsim = { workspace = true, optional = true }
pecos-engines = { workspace = true, optional = true }
pecos-programs = { workspace = true, optional = true }
pecos-qasm = { workspace = true, optional = true }
pecos-phir-json = { workspace = true, optional = true }
pecos-qis-core = { workspace = true, optional = true }
pecos-qis-selene = { workspace = true, optional = true }
pecos-llvm = { workspace = true, optional = true }
pecos-hugr-qis = { workspace = true, optional = true }
pecos-hugr = { workspace = true, optional = true }
pecos-phir = { workspace = true, optional = true, features = ["hugr"] }
pecos-rng = { workspace = true, optional = true }
pecos-num = { workspace = true, optional = true }
log = { workspace = true, optional = true }
tempfile = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }

# CLI dependencies (optional)
clap = { workspace = true, optional = true }
clap_complete = { workspace = true, optional = true }
env_logger = { workspace = true, optional = true }
pecos-build = { workspace = true, optional = true }
cargo_metadata = { workspace = true, optional = true }

# Quantum simulator backends (optional - for Python bindings and advanced users)
pecos-cppsparsesim = { workspace = true, optional = true }
pecos-quest = { workspace = true, optional = true }
pecos-qulacs = { workspace = true, optional = true }

# WebAssembly foreign object support (optional)
pecos-wasm = { workspace = true, optional = true }

# Decoder backends (optional)
pecos-decoders = { workspace = true, optional = true }

[features]
# Default: CLI dev tools + core types for library users
default = ["cli", "core"]

# CLI binary with dev tools (lightweight - no simulation dependencies)
cli = ["dep:clap", "dep:clap_complete", "dep:env_logger", "dep:pecos-build", "dep:cargo_metadata"]

# Runtime: enables full simulation library with QASM and PHIR support
# Use this for CLI runtime commands (run, compile, info, doctor, examples)
runtime = ["sim", "qasm", "phir"]

# Core types and error handling (very lightweight)
core = ["dep:pecos-core"]

# Quantum circuit representation (DagCircuit)
quantum = ["core", "dep:pecos-quantum"]

# Numerical computing utilities (scipy-like functions, random number generation)
num = ["dep:pecos-num", "dep:pecos-rng"]

# Quantum simulation library (includes core, quantum, and num)
sim = [
    "core", "quantum", "num",
    "dep:pecos-qsim", "dep:pecos-engines", "dep:pecos-programs",
    "dep:pecos-phir",
    "dep:log", "dep:tempfile", "dep:serde_json"
]

# Program formats (require sim)
qasm = ["sim", "dep:pecos-qasm"]
phir = ["sim", "dep:pecos-phir-json"]

# Heavy external dependencies
# llvm: Enables LLVM infrastructure (required for QIS)
llvm = ["sim", "dep:pecos-llvm"]

# qis: QIS/LLVM IR execution support (Selene runtime)
qis = ["llvm", "dep:pecos-qis-core", "pecos-qis-core/llvm",
       "dep:pecos-qis-selene"]

# hugr: HUGR program support (requires QIS) + direct HUGR interpreter
hugr = ["qis", "dep:pecos-hugr-qis", "pecos-hugr-qis/llvm", "pecos-qis-selene/hugr", "pecos-quantum/hugr", "dep:pecos-hugr"]
wasm = ["sim", "dep:pecos-wasm", "pecos-wasm/wasm"]

# Quantum simulator backends (C++ wrappers)
cppsparsesim = ["sim", "dep:pecos-cppsparsesim"]
quest = ["sim", "dep:pecos-quest"]
qulacs = ["sim", "dep:pecos-qulacs"]
all-simulators = ["cppsparsesim", "quest", "qulacs"]

# NVIDIA CUDA support
cuda = ["quest", "pecos-quest/cuda"]

# Decoder backends
ldpc = ["sim", "dep:pecos-decoders", "pecos-decoders/ldpc"]
all-decoders = ["ldpc"]

# Everything
full = ["runtime", "all-simulators", "all-decoders", "hugr", "wasm"]

[dev-dependencies]
tempfile.workspace = true
assert_cmd.workspace = true
# Required for doctests
pecos-core.workspace = true
pecos-qsim.workspace = true
pecos-engines.workspace = true
pecos-qasm.workspace = true
pecos-phir = { workspace = true, features = ["hugr"] }
pecos-rng.workspace = true
log.workspace = true
serde_json.workspace = true

[[test]]
name = "cli"
required-features = ["runtime", "qis"]

[[test]]
name = "unified_sim_api_test"
required-features = ["runtime", "qis"]

[[example]]
name = "quest_example"
required-features = ["quest"]

[[example]]
name = "sim_api_final"
required-features = ["runtime", "qis"]

[[example]]
name = "sim_api_examples"
required-features = ["runtime", "qis"]

[[example]]
name = "unified_sim_demo"
required-features = ["runtime"]

[[example]]
name = "unified_sim_auto_selection"
required-features = ["runtime"]

[[example]]
name = "unified_sim_reusable"
required-features = ["runtime"]

[lints]
workspace = true
