[package]
name = "pecos"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"
description = "A crate for evaluating and exploring quantum error correction."

[lib]
doctest = true
test = true

[dependencies]
pecos-core.workspace = true
pecos-qsim.workspace = true
pecos-engines.workspace = true
pecos-programs.workspace = true
pecos-qasm.workspace = true
pecos-phir-json.workspace = true
pecos-qis-ffi-types.workspace = true
pecos-qis-core.workspace = true
pecos-qis-selene = { workspace = true, optional = true }
pecos-llvm = { workspace = true, optional = true }
pecos-hugr-qis = { workspace = true, optional = true }
pecos-phir = { workspace = true, features = ["hugr"] }
pecos-rng.workspace = true
pecos-num.workspace = true
log.workspace = true
tempfile.workspace = true
serde_json.workspace = true

# Quantum simulator backends (optional - for Python bindings and advanced users)
pecos-cppsparsesim = { workspace = true, optional = true }
pecos-quest = { workspace = true, optional = true }
pecos-qulacs = { workspace = true, optional = true }

# WebAssembly foreign object support (optional)
pecos-wasm = { workspace = true, optional = true }

[features]
default = ["selene", "qasm", "phir", "wasm", "all-simulators"]
qasm = []
llvm = ["pecos-qis-core/llvm", "pecos-llvm", "pecos-hugr-qis", "pecos-hugr-qis?/llvm"]
phir = []
selene = ["pecos-qis-selene"]

# WebAssembly support
wasm = ["pecos-wasm", "pecos-wasm/wasm"]

# Quantum simulator backends
cppsparsesim = ["pecos-cppsparsesim"]
quest = ["pecos-quest"]
qulacs = ["pecos-qulacs"]

# Quest-specific features
gpu = ["quest", "pecos-quest/gpu"]

# All simulator backends
all-simulators = ["cppsparsesim", "quest", "qulacs"]

[dev-dependencies]
tempfile.workspace = true
# Required for doctests
pecos-core.workspace = true
pecos-qsim.workspace = true
pecos-engines.workspace = true
pecos-qasm.workspace = true
pecos-phir = { workspace = true, features = ["hugr"] }
pecos-rng.workspace = true
log.workspace = true
serde_json.workspace = true

[lints]
workspace = true
