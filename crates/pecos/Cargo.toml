[package]
name = "pecos"
version.workspace = true
edition.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme = "../../README.md"
description = "A crate for evaluating and exploring quantum error correction."

[lib]
doctest = true
test = true

[dependencies]
pecos-core.workspace = true
pecos-qsim.workspace = true
pecos-engines.workspace = true
pecos-qasm.workspace = true
pecos-phir.workspace = true
pecos-llvm-runtime = { workspace = true }
pecos-hugr-llvm = { path = "../pecos-hugr-llvm" }
pecos-pmir = { workspace = true, optional = true }
log.workspace = true
tempfile.workspace = true
serde_json.workspace = true

[features]
default = []
pmir-pipeline = ["pecos-pmir"]

[dev-dependencies]
tempfile.workspace = true
# Required for doctests
pecos-core.workspace = true
pecos-qsim.workspace = true
pecos-engines.workspace = true
pecos-qasm.workspace = true
pecos-llvm-runtime = { workspace = true }
pecos-phir.workspace = true
log.workspace = true
serde_json.workspace = true

[lints]
workspace = true
